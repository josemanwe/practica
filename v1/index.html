<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Notas v1</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 Gestor de Notas</h1>
      <p class="version">Versión 1.0 - MVP</p>
    </header>

    <!-- Formulario para crear nota -->
    <section class="formulario-seccion">
      <h2 id="form-titulo">Nueva Nota</h2>
      <form id="nota-form">
        <div class="campo">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" placeholder="Título de la nota" required>
        </div>
        <div class="campo">
          <label for="contenido">Contenido</label>
          <textarea id="contenido" rows="4" placeholder="Escribe el contenido aquí..." required></textarea>
        </div>
        <div class="botones-form">
          <button type="submit" id="btn-guardar">Crear Nota</button>
          <button type="button" id="btn-cancelar" class="oculto">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Lista de notas -->
    <section class="notas-seccion">
      <h2>Mis Notas (<span id="contador">0</span>)</h2>
      <div id="notas-list" class="notas-grid">
        <!-- Las notas se renderizan aquí -->
      </div>
      <p id="sin-notas" class="sin-notas">No hay notas todavía. ¡Crea tu primera nota!</p>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
